name: CI

on:
  push:
    branches: [main]
    paths:
      - 'constraint-solver/**'
  pull_request:
    branches: [main]
    paths:
      - 'constraint-solver/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    defaults:
      run:
        working-directory: constraint-solver

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check csp_solver/ tests/ || true

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run CLI smoke test
        run: |
          python -m csp_solver queens --n 4 --json
          python -m csp_solver coloring --colors 3 --json
          python -m csp_solver magic --n 3 --timeout 60