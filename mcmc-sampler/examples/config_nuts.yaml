# Sample from N(2, 1.5) using NUTS with step-size adaptation
target:
  kind: normal
  params:
    mu: 2.0
    sigma: 1.5

sampler:
  algo: nuts
  params:
    target_accept: 0.65
    init_step_size: 0.25
    max_tree_depth: 10

run:
  n_samples: 5000
  burn: 2000
  thin: 2
  seed: 42
  n_chains: 1

output:
  trace_json: null
  diagnostics: true
  visualize: false
  summary: true
  log_level: INFO