# Sample from a bimodal mixture using Adaptive Metropolis

[target]
kind = "mixture"

[target.params]
weights = [0.5, 0.5]

[[target.params.components]]
kind = "normal"
mu = -3.0
sigma = 1.0

[[target.params.components]]
kind = "normal"
mu = 3.0
sigma = 1.0

[sampler]
algo = "am"

[sampler.params]
init_std = 2.0

[run]
n_samples = 10000
burn = 3000
thin = 1
seed = 7
n_chains = 1

[output]
trace_json = "mixture_trace.json"
diagnostics = true
visualize = true
summary = true
log_level = "INFO"