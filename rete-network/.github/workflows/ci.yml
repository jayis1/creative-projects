name: CI

on:
  push:
    paths:
      - 'rete-network/**'
  pull_request:
    paths:
      - 'rete-network/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: rete-network
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: rete-network
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run smoke tests
        working-directory: rete-network
        run: |
          python smoke_test.py
          python enhanced_test.py

      - name: Run CLI integration tests
        working-directory: rete-network
        run: |
          python -m rete.cli version
          python -m rete.cli run examples/social.json
          python -m rete.cli run examples/ancestry.json
          python -m rete.cli validate examples/social.json
          python -m rete.cli agenda examples/social.json
          python -m rete.cli network examples/social.json --summary