[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rete-network"
version = "1.0.0"
description = "Rete forward-chaining rule inference engine"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [{name = "creative-projects"}]

[tool.setuptools.packages.find]
include = ["rete*"]