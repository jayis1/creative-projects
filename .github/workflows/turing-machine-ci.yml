name: CI

on:
  push:
    paths:
      - 'turing-machine/**'
      - '.github/workflows/turing-machine-ci.yml'
  pull_request:
    paths:
      - 'turing-machine/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: turing-machine
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: turing-machine
        run: |
          pytest tests/ -v --tb=short

      - name: Run CLI smoke tests
        working-directory: turing-machine
        run: |
          python -m turing_machine.cli list
          python -m turing_machine.cli run binary_incrementer --input 1011
          python -m turing_machine.cli run busy_beaver_4
          python -m turing_machine.cli check 101
          python -m turing_machine.cli analyze binary_incrementer --input 1011
          python -m turing_machine.cli step binary_incrementer --input 1011 --n 3
          python -m turing_machine.cli visualize binary_incrementer --input 1011 --format text