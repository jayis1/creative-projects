name: nbody-sim CI

on:
  push:
    paths:
      - 'nbody-sim/**'
      - '.github/workflows/nbody-sim-ci.yml'
  pull_request:
    paths:
      - 'nbody-sim/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pyyaml
          pip install -e ./nbody-sim

      - name: Run tests
        working-directory: nbody-sim
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Verify CLI
        working-directory: nbody-sim
        run: |
          python -m nbody --preset two-body --steps 10 --quiet
          python -m nbody --preset figure-eight --steps 10 --integrator leapfrog --quiet
          python -m nbody --preset plummer --n-bodies 20 --steps 10 --quiet

      - name: Verify examples
        working-directory: nbody-sim
        run: |
          python examples/two_body.py
          python examples/figure_eight.py