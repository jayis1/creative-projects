name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'bytecode-vm-lang/**'
      - '.github/workflows/bytecode-vm-lang.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'bytecode-vm-lang/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run tests
        working-directory: bytecode-vm-lang
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run example programs
        working-directory: bytecode-vm-lang
        run: |
          python -m minilang check examples/fibonacci.ml
          python -m minilang run examples/fibonacci.ml
          python -m minilang check examples/bubblesort.ml
          python -m minilang run examples/bubblesort.ml
          python -m minilang check examples/primes.ml
          python -m minilang run examples/primes.ml
          python -m minilang check examples/gcd.ml
          python -m minilang run examples/gcd.ml
          python -m minilang run examples/string_demo.ml
          python -m minilang run examples/array_demo.ml
          python -m minilang run examples/elif_demo.ml

      - name: Run benchmarks (smoke test)
        working-directory: bytecode-vm-lang
        run: |
          python -m minilang benchmark examples/gcd.ml -n 5