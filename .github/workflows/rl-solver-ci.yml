name: CI

on:
  push:
    paths:
      - 'rl-solver/**'
      - '.github/workflows/rl-solver-ci.yml'
  pull_request:
    paths:
      - 'rl-solver/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ./rl-solver
      - run: pytest ./rl-solver/tests -v