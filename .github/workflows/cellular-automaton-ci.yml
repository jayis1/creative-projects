name: CI

on:
  push:
    paths:
      - 'cellular-automaton/**'
      - '.github/workflows/cellular-automaton-ci.yml'
  pull_request:
    paths:
      - 'cellular-automaton/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: cellular-automaton
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: cellular-automaton
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run tests with coverage
        working-directory: cellular-automaton
        run: |
          pip install pytest-cov
          python -m pytest tests/ --cov=cellular_automaton --cov-report=term-missing

      - name: Verify CLI is installed
        working-directory: cellular-automaton
        run: |
          cellular-automaton --version
          cellular-automaton rules
          cellular-automaton patterns