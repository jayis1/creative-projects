name: CI

on:
  push:
    paths:
      - 'network-flow-solver/**'
      - '.github/workflows/network-flow-solver.yml'
  pull_request:
    paths:
      - 'network-flow-solver/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          cd network-flow-solver && pip install -e .

      - name: Run tests
        run: |
          cd network-flow-solver
          python -m pytest tests/ -v --tb=short --cov=networkflow --cov-report=term-missing

      - name: Run smoke test
        run: |
          cd network-flow-solver
          python smoke_test_new.py

      - name: Run examples
        run: |
          cd network-flow-solver
          for f in examples/*.py; do
            echo "Running $f..."
            python "$f" || { echo "FAILED: $f"; exit 1; }
          done