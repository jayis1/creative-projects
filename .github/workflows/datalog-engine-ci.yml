name: CI

on:
  push:
    branches: [main]
    paths:
      - 'datalog-engine/**'
  pull_request:
    branches: [main]
    paths:
      - 'datalog-engine/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: datalog-engine
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: datalog-engine
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run legacy tests
        working-directory: datalog-engine
        run: |
          python test_smoke.py
          python test_enhanced.py
          python test_bug_hunt.py

      - name: Test CLI
        working-directory: datalog-engine
        run: |
          python -m datalog.cli examples/graph.dl -q "path(a, Y)"
          python -m datalog.cli examples/family.dl --explain ancestor
          python -m datalog.cli examples/company.dl --format table -q "well_paid(X)"

      - name: Generate coverage report
        working-directory: datalog-engine
        run: |
          python -m pytest tests/ --cov=datalog --cov-report=term-missing