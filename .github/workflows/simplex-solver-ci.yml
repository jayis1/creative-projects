name: CI

on:
  push:
    branches: [main, master]
    paths:
      - "simplex-solver/**"
      - ".github/workflows/simplex-solver-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "simplex-solver/**"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e ./simplex-solver

      - name: Run tests
        working-directory: simplex-solver
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Smoke-test CLI
        working-directory: simplex-solver
        run: |
          python -m simplex version
          python -m simplex solve examples/diet.json --pretty
          python -m simplex solve examples/knapsack.json --table
          python -m simplex convert examples/diet.json /tmp/diet.lp
          python -m simplex convert /tmp/diet.lp /tmp/diet.json
          python -m simplex validate examples/production.json
          python -m simplex batch "examples/*.json"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        working-directory: simplex-solver
        run: |
          ruff check simplex/ tests/ || true
          ruff format --check simplex/ tests/ || true