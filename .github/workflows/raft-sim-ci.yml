name: CI

on:
  push:
    paths:
      - 'raft-sim/**'
  pull_request:
    paths:
      - 'raft-sim/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: raft-sim
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: raft-sim
        run: |
          pytest tests/ -v --tb=short

      - name: Run CLI smoke test
        working-directory: raft-sim
        run: |
          python -m raft.cli run --size 3 --duration 10 --seed 42
          python -m raft.cli crash --size 3 --seed 42 --duration 20
          python -m raft.cli config --size 5 --seed 100