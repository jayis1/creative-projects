name: CI

on:
  push:
    paths:
      - 'waveform-synth/**'
    branches: [main]
  pull_request:
    paths:
      - 'waveform-synth/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd waveform-synth
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd waveform-synth
          python -m pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: |
          cd waveform-synth
          pip install pytest-cov
          python -m pytest tests/ --cov=waveform_synth --cov-report=term-missing

      - name: Verify CLI
        run: |
          cd waveform-synth
          waveform-synth --version
          waveform-synth --help
          waveform-synth generate --waveform sine --frequency 440 --duration 0.1 --output /tmp/test.wav
          waveform-synth analyze --input /tmp/test.wav
          waveform-synth noise --color pink --duration 0.1 --output /tmp/noise.wav
          waveform-synth wavetable --table classic_analog --frequency 220 --duration 0.1 --output /tmp/wt.wav