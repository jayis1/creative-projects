name: CI

on:
  push:
    paths:
      - 'petri-net-sim/**'
      - '.github/workflows/petri-net-sim-ci.yml'
  pull_request:
    paths:
      - 'petri-net-sim/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: petri-net-sim
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyyaml

      - name: Run tests
        working-directory: petri-net-sim
        run: |
          python -m pytest --tb=short -v --cov=petri --cov-report=term-missing

      - name: Verify CLI
        working-directory: petri-net-sim
        run: |
          python -m petri.cli presets
          python -m petri.cli --preset mutual_exclusion show
          python -m petri.cli --preset workflow export --format pnml > /dev/null
          python -m petri.cli --preset mutual_exclusion batch --runs 10 --steps 20