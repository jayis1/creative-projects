[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "petri-net-sim"
version = "1.0.0"
description = "Petri net (P/T net) simulator and analysis toolkit"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
authors = [{name = "creative-projects"}]
keywords = ["petri-net", "simulation", "reachability", "concurrency", "verification"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Topic :: Scientific/Engineering",
    "Programming Language :: Python :: 3",
]

[project.scripts]
petri = "petri.cli:main"

[tool.setuptools]
packages = ["petri"]