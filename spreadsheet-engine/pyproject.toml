[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "spreadsheet-engine"
version = "3.0.0"
description = "From-scratch spreadsheet formula engine with dependency tracking, recalculation, 120+ functions, config support, and CLI"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [{name = "Creative Projects"}]
keywords = ["spreadsheet", "formula", "engine", "parser", "excel", "calculation"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Office/Business :: Financial :: Spreadsheet",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.optional-dependencies]
yaml = ["pyyaml>=6.0"]
dev = ["pytest>=7.0", "pytest-cov>=4.0"]
all = ["pyyaml>=6.0", "pytest>=7.0", "pytest-cov>=4.0"]

[project.scripts]
spreadsheet = "spreadsheet.cli:main"

[tool.setuptools.packages.find]
include = ["spreadsheet*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["spreadsheet"]
omit = ["*/tests/*", "*/.venv/*"]