[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "spreadsheet-engine"
version = "1.0.0"
description = "From-scratch spreadsheet formula engine with dependency tracking and recalculation"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [{name = "Creative Projects"}]

[project.scripts]
spreadsheet = "spreadsheet.cli:main"

[tool.setuptools.packages.find]
include = ["spreadsheet*"]

[tool.pytest.ini_options]
testpaths = ["tests"]