name: CI

on:
  push:
    paths:
      - 'spreadsheet-engine/**'
      - '.github/workflows/spreadsheet-engine.yml'
  pull_request:
    paths:
      - 'spreadsheet-engine/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: spreadsheet-engine
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyyaml

      - name: Run tests
        working-directory: spreadsheet-engine
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run example
        working-directory: spreadsheet-engine
        run: |
          python examples/budget.py

      - name: Test CLI
        working-directory: spreadsheet-engine
        run: |
          python -m spreadsheet.cli functions
          python -m spreadsheet.cli eval Sheet1 "SUM(1,2,3,4,5)"
          python -m spreadsheet.cli set Sheet1 A1 42
          python -m spreadsheet.cli get Sheet1 A1