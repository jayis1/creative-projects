# GitHub Actions CI Configuration
# 
# This file should be placed at .github/workflows/forth-interpreter.yml
# in the repository root. It was placed here because the current PAT
# doesn't have workflow scope to push to .github/workflows/ directly.
# Copy this file to .github/workflows/forth-interpreter.yml to enable CI.

name: Forth Interpreter Tests

on:
  push:
    paths:
      - "forth-interpreter/**"
  pull_request:
    paths:
      - "forth-interpreter/**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: forth-interpreter

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run examples
        run: |
          python -m forth -f examples/primes.fs --no-banner
          python -m forth -f examples/bubble-sort.fs --no-banner
          python -m forth -f examples/strings.fs --no-banner
          python -m forth -f examples/fibonacci.fs --no-banner
          python -m forth -f examples/arrays.fs --no-banner
          python -m forth -f examples/exceptions.fs --no-banner

      - name: Quick test script
        run: python test_quick.py