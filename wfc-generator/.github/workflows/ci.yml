name: CI

on:
  push:
    paths:
      - "wfc-generator/**"
  pull_request:
    paths:
      - "wfc-generator/**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: wfc-generator
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest suite
        working-directory: wfc-generator
        run: python -m pytest tests/ -q

      - name: Run legacy self-contained suite
        working-directory: wfc-generator
        run: python test_wfc.py

      - name: Smoke-test the CLI
        working-directory: wfc-generator
        run: |
          python -m wfc_generator.cli terrain --width 10 --height 6 --seed 1 --stats
          python -m wfc_generator.cli list-presets