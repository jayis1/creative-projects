[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wfc-generator"
version = "2.0.0"
description = "Wave Function Collapse procedural generation engine — tiles, overlap model, 7 presets, CLI, config system, multi-format rendering"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "creative-projects contributors" }]
keywords = [
  "wave-function-collapse", "wfc", "procedural-generation",
  "cellular-automata", "tiles", "overlap-model", "game-dev",
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Games/Entertainment",
  "Topic :: Multimedia :: Graphics",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed",
]
dependencies = []

[project.optional-dependencies]
yaml = ["pyyaml>=5.0"]
png  = ["Pillow>=9.0"]
dev  = ["pytest>=7.0", "pyyaml>=5.0"]

[project.scripts]
wfc = "wfc_generator.cli:main"

[project.urls]
Repository = "https://github.com/jayis1/creative-projects"

[tool.setuptools]
packages = ["wfc_generator"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"