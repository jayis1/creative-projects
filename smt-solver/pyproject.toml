[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "smt-solver"
version = "1.0.0"
description = "DPLL(T)-based SMT solver with EUF and Linear Real Arithmetic theories"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [{name = "AI-generated"}]
keywords = ["smt", "sat", "solver", "dpll", "euf", "simplex", "theorem-proving"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]

[project.scripts]
smt-solver = "smt_solver.__main__:main"

[tool.setuptools.packages.find]
include = ["smt_solver*"]