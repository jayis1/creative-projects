[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "raytracer"
version = "2.0.0"
description = "A from-scratch recursive ray tracer in pure Python (BVH, materials, DoF, textures, animation)."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "Creative Projects"}]
keywords = ["ray-tracer", "rendering", "path-tracer", "bvH", "graphics"]
dependencies = [
    "Pillow>=9.0",
]

[project.optional-dependencies]
yaml = ["PyYAML>=6.0"]
dev = ["pytest>=7.0", "PyYAML>=6.0"]

[project.scripts]
raytracer = "raytracer.cli:main"

[tool.setuptools.packages.find]
include = ["raytracer*"]