[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "turing-machine"
version = "1.0.0"
description = "A Turing machine simulator with multi-tape support, a definition language, and a library of classic machines"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "creative-projects"}]

[project.scripts]
turing-machine = "turing_machine.cli:main"

[tool.setuptools.packages.find]
include = ["turing_machine*"]