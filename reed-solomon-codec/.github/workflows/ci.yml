name: CI

on:
  push:
    paths:
      - "reed-solomon-codec/**"
  pull_request:
    paths:
      - "reed-solomon-codec/**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: reed-solomon-codec
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml
          pip install -e .

      - name: Run tests
        working-directory: reed-solomon-codec
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run examples
        working-directory: reed-solomon-codec
        run: |
          python examples/basic_encode_decode.py
          python examples/erasure_correction.py
          python examples/burst_error.py
          python examples/file_protection.py

      - name: Run CLI demo
        working-directory: reed-solomon-codec
        run: |
          python -m reed_solomon.cli demo --nsym 10
          python -m reed_solomon.cli burst-demo --nsym 10 --depth 4
          python -m reed_solomon.cli bench --nsym 10 --size 50 --iterations 10