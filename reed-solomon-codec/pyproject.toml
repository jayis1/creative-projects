[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "reed-solomon-codec"
version = "2.0.0"
description = "From-scratch Reed-Solomon error-correcting code library over GF(2^8)"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Creative Projects"},
]
keywords = [
    "reed-solomon",
    "error-correction",
    "galois-field",
    "ecc",
    "coding-theory",
    "berlekamp-massey",
    "forney",
    "chien-search",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Communications",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.optional-dependencies]
yaml = ["pyyaml>=6.0"]
toml-old = ["tomli>=2.0; python_version < '3.11'"]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "pyyaml>=6.0",
]

[project.scripts]
rsc = "reed_solomon.cli:main"

[project.urls]
"Homepage" = "https://github.com/jayis1/creative-projects/tree/main/reed-solomon-codec"

[tool.setuptools]
packages = ["reed_solomon"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
minversion = "7.0"