[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nbody-sim"
version = "3.0.0"
description = "A 2D Barnes-Hut N-body gravity simulator with symplectic integration, multiple integrators, numpy acceleration, and PPM rendering."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Creative Projects" }]
keywords = ["nbody", "gravity", "simulation", "barnes-hut", "leapfrog", "physics"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "numpy>=1.24",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
test = ["pytest>=7.0"]
viz = ["matplotlib>=3.7"]
all = ["pytest>=7.0", "matplotlib>=3.7"]

[project.scripts]
nbody = "nbody.cli:main"

[tool.setuptools.packages.find]
include = ["nbody*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.mypy]
ignore_missing_imports = true