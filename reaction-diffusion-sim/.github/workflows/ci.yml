name: CI

on:
  push:
    branches: [main]
    paths:
      - 'reaction-diffusion-sim/**'
  pull_request:
    branches: [main]
    paths:
      - 'reaction-diffusion-sim/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    defaults:
      run:
        working-directory: reaction-diffusion-sim

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy matplotlib pillow pyyaml toml pytest

      - name: Install package
        run: pip install -e .

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reaction-diffusion-sim

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy matplotlib pillow pyyaml toml pytest flake8

      - name: Lint with flake8
        run: |
          flake8 rdsim/ --max-line-length=100 --exclude=__pycache__
          flake8 tests/ --max-line-length=100 --exclude=__pycache__