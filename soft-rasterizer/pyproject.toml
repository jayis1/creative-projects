[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "soft-rasterizer"
version = "2.0.0"
description = "A from-scratch software 3D rasterizer with z-buffering, texture mapping, Phong/Gouraud/Toon shading, JSON scene config, animation, and post-processing"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [{name = "AI Generated"}]
keywords = ["rasterizer", "3d-graphics", "software-rendering", "z-buffer", "rasterization", "phong-shading", "gouraud", "toon-shading"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Multimedia :: Graphics :: 3D Rendering",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Intended Audience :: Developers",
    "Intended Audience :: Education",
    "Development Status :: 4 - Beta",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-cov"]

[project.scripts]
soft-rasterizer = "soft_rasterizer.cli:main"

[tool.setuptools.packages.find]
include = ["soft_rasterizer*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]