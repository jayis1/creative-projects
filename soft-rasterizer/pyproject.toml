[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "soft-rasterizer"
version = "1.0.0"
description = "A from-scratch software 3D rasterizer with z-buffering, texture mapping, and Gouraud/Phong shading"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [{name = "AI Generated"}]
keywords = ["rasterizer", "3d-graphics", "software-rendering", "z-buffer", "rasterization"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Topic :: Multimedia :: Graphics :: 3D Rendering",
    "License :: OSI Approved :: MIT License",
]

[project.scripts]
soft-rasterizer = "soft_rasterizer.cli:main"

[tool.setuptools.packages.find]
include = ["soft_rasterizer*"]