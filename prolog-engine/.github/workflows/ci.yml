name: CI

on:
  push:
    branches: [main]
    paths:
      - 'prolog-engine/**'
  pull_request:
    branches: [main]
    paths:
      - 'prolog-engine/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: prolog-engine
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: prolog-engine
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run tests with coverage
        working-directory: prolog-engine
        run: |
          pip install pytest-cov
          python -m pytest tests/ --cov=prolog_engine --cov-report=term-missing

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        working-directory: prolog-engine
        run: |
          ruff check prolog_engine/ tests/