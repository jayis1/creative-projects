[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nonogram-solver"
version = "3.0.0"
description = "Nonogram (Picross/Hanjie) solver, generator, and player from scratch"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "Creative Coder Pipeline"}]
keywords = ["nonogram", "picross", "hanjie", "puzzle", "solver", "constraint-propagation"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Games/Entertainment :: Puzzle Games",
]

[project.optional-dependencies]
yaml = ["PyYAML>=6.0"]
dev = ["pytest>=7.0", "PyYAML>=6.0"]

[project.scripts]
nonogram = "nonogram.cli:main"

[tool.setuptools.packages.find]
include = ["nonogram*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]