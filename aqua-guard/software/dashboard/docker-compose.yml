version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: aquaguard
      POSTGRES_USER: aqua
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"

  api:
    build: ./backend
    environment:
      DB_PATH: /data/aquaguard.db
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
    volumes:
      - dbdata:/data
    ports:
      - "8000:8000"
    depends_on:
      - mosquitto

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  dbdata: