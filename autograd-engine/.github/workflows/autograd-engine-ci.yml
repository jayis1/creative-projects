# GitHub Actions CI for autograd-engine
name: CI

on:
  push:
    paths:
      - 'autograd-engine/**'
  pull_request:
    paths:
      - 'autograd-engine/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pyyaml
          cd autograd-engine && pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd autograd-engine
          python -m pytest tests/ -v --tb=short

      - name: Run enhanced tests
        run: |
          cd autograd-engine
          python test_enhanced.py

      - name: Run gradient check
        run: |
          cd autograd-engine
          python -m autograd_engine.cli grad-check

      - name: Run demo
        run: |
          cd autograd-engine
          python -m autograd_engine.cli demo

      - name: Test CLI info
        run: |
          cd autograd-engine
          python -m autograd_engine.cli info