name: CI

on:
  push:
    paths:
      - 'btree-store/**'
  pull_request:
    paths:
      - 'btree-store/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
      - name: Run tests
        working-directory: btree-store
        run: |
          python -m pytest tests/ -v --tb=short --cov=btreestore --cov-report=term-missing
      - name: Run CLI smoke test
        working-directory: btree-store
        run: |
          python btreestore_cli.py --db /tmp/test.btree put hello world
          python btreestore_cli.py --db /tmp/test.btree get hello
          python btreestore_cli.py --db /tmp/test.btree info --format json
          python btreestore_cli.py --db /tmp/test.btree stats --format json
          python btreestore_cli.py --db /tmp/test.btree scan --format json
          python btreestore_cli.py --db /tmp/test.btree stream
          python btreestore_cli.py --db /tmp/test.btree count
          python btreestore_cli.py --db /tmp/test.btree validate
          python btreestore_cli.py --db /tmp/test.btree compact
          python btreestore_cli.py --db /tmp/test.btree backup /tmp/test.bak
          python btreestore_cli.py --db /tmp/test.btree backup-info /tmp/test.bak
          python btreestore_cli.py --db /tmp/test.btree restore /tmp/test.bak /tmp/restored.btree
          python btreestore_cli.py --db /tmp/restored.btree get hello