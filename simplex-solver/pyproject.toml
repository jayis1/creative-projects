[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "simplex-solver"
version = "1.0.0"
description = "Exact linear & integer programming via the two-phase Simplex method (pure Python, stdlib only)"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "creative-projects"}]
keywords = ["linear-programming", "simplex", "integer-programming", "branch-and-bound", "operations-research", "exact-arithmetic"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Mathematics",
]

[project.scripts]
simplex-solver = "simplex.cli:main"

[tool.setuptools.packages.find]
include = ["simplex*"]

[tool.pytest.ini_options]
testpaths = ["tests"]