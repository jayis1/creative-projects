[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "networkflow"
version = "3.0.0"
description = "From-scratch network flow solver: max-flow, min-cut, min-cost flow, bipartite matching, assignment, visualization, and more"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "Creative Projects"}]
keywords = ["max-flow", "min-cut", "min-cost-flow", "bipartite-matching", "assignment", "graph-algorithms", "network-flow"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Mathematics",
]

[project.optional-dependencies]
yaml = ["pyyaml"]
dev = ["pytest>=7.0", "pytest-cov", "ruff"]
viz = ["graphviz"]

[project.scripts]
networkflow = "networkflow.cli:main"

[project.urls]
Repository = "https://github.com/jayis1/creative-projects"

[tool.setuptools.packages.find]
include = ["networkflow*"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"