[project]
name = "raft-sim"
version = "1.0.0"
description = "Discrete-event Raft consensus algorithm simulator"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "creative-projects" }]

[project.scripts]
raft-sim = "raft.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["raft"]

[tool.pytest.ini_options]
testpaths = ["tests"]