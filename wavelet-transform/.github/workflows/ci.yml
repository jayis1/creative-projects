name: CI

on:
  push:
    paths:
      - 'wavelet-transform/**'
  pull_request:
    paths:
      - 'wavelet-transform/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml
          cd wavelet-transform && pip install -e .

      - name: Run tests
        run: |
          cd wavelet-transform
          python -m pytest tests/ -v --tb=short

      - name: Run examples (smoke test)
        run: |
          cd wavelet-transform
          for f in examples/*.py; do
            echo "Running $f..."
            python "$f" > /dev/null || { echo "FAILED: $f"; exit 1; }
          done

      - name: CLI smoke test
        run: |
          cd wavelet-transform
          wavelet-transform info -w db4
          wavelet-transform decompose -s chirp -n 128 -w db4 -l 3
          wavelet-transform denoise -s blocks -n 256 -w db4 --method bayes
          wavelet-transform cwt -s chirp -n 128 -w morlet
          wavelet-transform analyze -s ecg -n 256 -w db4
          wavelet-transform signals --list
          wavelet-transform compare -s doppler -n 256