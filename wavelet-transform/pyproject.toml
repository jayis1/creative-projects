[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "wavelet-transform"
version = "2.0.0"
description = "From-scratch wavelet transform toolkit: DWT, MODWT, SWT, CWT, packets, denoising, compression, analysis"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
authors = [{name = "AI Generated"}]
keywords = [
    "wavelet", "dwt", "modwt", "swt", "cwt",
    "signal-processing", "denoising", "compression",
    "time-frequency", "scalogram",
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Scientific/Engineering :: Signal Processing",
    "License :: OSI Approved :: MIT License",
]

[project.optional-dependencies]
yaml = ["pyyaml"]
dev = ["pytest>=7.0", "pyyaml"]

[project.scripts]
wavelet-transform = "wavelet.cli:main"

[tool.setuptools]
packages = ["wavelet"]