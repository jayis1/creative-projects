[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "wavelet-transform"
version = "1.0.0"
description = "From-scratch wavelet transform toolkit: DWT, MODWT, packets, denoising, compression"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
authors = [{name = "AI Generated"}]
keywords = ["wavelet", "dwt", "signal-processing", "denoising", "compression"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Mathematics",
]

[project.scripts]
wavelet-transform = "wavelet.cli:main"

[tool.setuptools]
packages = ["wavelet"]