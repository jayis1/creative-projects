[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "scheme-interpreter"
version = "1.0.0"
description = "A from-scratch Scheme interpreter with TCO, call/cc, and syntax-rules macros"
requires-python = ">=3.9"
license = {text = "MIT"}

[project.scripts]
scheme = "scheme_interpreter.cli:main"

[tool.setuptools.packages.find]
include = ["scheme_interpreter*"]