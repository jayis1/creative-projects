name: CI

on:
  push:
    branches: [main]
    paths:
      - 'cdcl-sat-solver/**'
  pull_request:
    branches: [main]
    paths:
      - 'cdcl-sat-solver/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: cdcl-sat-solver
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: cdcl-sat-solver
        run: |
          python -m pytest tests/ -v --timeout=120

      - name: Run examples
        working-directory: cdcl-sat-solver
        run: |
          python examples/basic_solving.py
          python examples/incremental_solving.py