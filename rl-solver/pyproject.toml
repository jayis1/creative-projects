[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "rl-solver"
version = "1.0.0"
description = "Markov Decision Process & Reinforcement Learning solver toolkit"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "creative-projects"}]
keywords = ["mdp", "reinforcement-learning", "dynamic-programming", "q-learning", "sarsa"]

[project.scripts]
rl-solver = "rl_solver.cli:main"

[tool.setuptools.packages.find]
include = ["rl_solver*"]

[tool.pytest.ini_options]
testpaths = ["tests"]